<!DOCTYPE html>
<html>
  <head>
    <meta name="google-signin-client_id" content="881946611252-ioghn31lemm0s28bloft60le0rao5co9.apps.googleusercontent.com">
    <script src="https://apis.google.com/js/platform.js" async defer></script>
  </head>
  <body>
    <div class="g-signin2" data-onsuccess="onSignIn"></div>

    <script type="text/javascript">
      function onSignIn(googleUser) {
        var profile = googleUser.getBasicProfile();
        var id_token = googleUser.getAuthResponse().id_token;
        var serverAuthCode = googleUser.getAuthResponse().serverAuthCode;

        console.log("Server Auth Code: " + serverAuthCode);

        // 将 serverAuthCode 发送到你的服务器
        fetch('/auth/google', {
          method: 'POST',
          body: JSON.stringify({ serverAuthCode: serverAuthCode }),
          headers: {
            'Content-Type': 'application/json'
          }
        })
        .then(response => response.json())
        .then(data => {
          // 处理返回的 PlayFab 登录信息
          console.log(data);
        })
        .catch(error => console.error('Error:', error));
      }
    </script>
  </body>
</html>
