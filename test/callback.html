<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
<script>

window.addEventListener('load', function() {
    const params = {};
    const url = new URL(window.location.href);
    url.searchParams.forEach((value, key) => {
        params[key] = value;
    });
    
    // 发送消息给打开它的父窗口
    if (window.opener) {
        window.opener.postMessage({
            type: 'OAUTH_CALLBACK',
            params: params,
            url: window.location.href
        }, '*'); // 生产环境建议替换为具体的父页面源
		
		  // 显示友好信息并自动关闭
		document.body.innerHTML = '<h3>授权成功，请返回应用</h3>';
		setTimeout(() => window.close(), 2000);
    }
});

</script>
</body>
</html>
